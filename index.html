<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayra Fragrances | The Aura Reveal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,900;1,400&display=swap');

        :root {
            --gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --royal-glow: rgba(212, 175, 55, 0.3);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050101; color: #d4af37; 
            font-family: 'Playfair Display', serif; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; cursor: default;
        }

        /* DYNAMIC LUXURY BACKGROUND */
        .bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #2a0808 0%, #050101 100%);
            z-index: -1;
        }

        .gold-particles {
            position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#d4af37 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1;
            animation: moveParticles 20s linear infinite;
        }

        @keyframes moveParticles { from { transform: translateY(0); } to { transform: translateY(-100%); } }

        .container { text-align: center; width: 100%; z-index: 10; perspective: 1500px; }

        /* HEADER SECTION */
        .brand-header { animation: fadeInDown 2s ease; margin-bottom: 60px; }
        
        .welcome-line {
            font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 10px;
            text-transform: uppercase; margin-bottom: 15px; color: #fcf6ba;
            display: block; opacity: 0.7;
        }

        h1 { 
            font-family: 'Cinzel', serif; letter-spacing: 18px; 
            text-transform: uppercase; margin: 0;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-size: clamp(1.5rem, 6vw, 3.5rem); font-weight: 900;
            filter: drop-shadow(0 0 20px rgba(191, 149, 63, 0.4));
            animation: titlePulse 4s infinite alternate;
        }

        @keyframes titlePulse { from { transform: scale(1); } to { transform: scale(1.02); } }

        }
