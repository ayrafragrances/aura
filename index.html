<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Ayra Fragrances | The Imperial Aura</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');

        :root {
            --gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --deep-red: #0a0202;
        }

        /* ABSTRACT PERFUMERY BACKGROUND - ELEMENTS OF MIST & PETALS (NO BOTTLES) */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #d4af37; font-family: 'Playfair Display', serif; 
            overflow: hidden;
        }

        /* DYNAMIC SCENT OVERLAY */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(10, 2, 2, 0.85) 0%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 1; pointer-events: none;
        }

        .master-wrapper {
            width: 100%; height: 100vh; position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* SELECTION INTERFACE */
        .ui-section { 
            text-align: center; width: 100%;

        }
