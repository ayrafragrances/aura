<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AYRA | The Sovereign Aura</title>
    <style>
        /* AYRA FRAGRANCES - COSMIC MONARCH V5.0
           "Flamboyant, Bold, and Kinetic"
        */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,900&family=Montserrat:wght@100;300;600;900&display=swap');

        :root {
            --royal-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --nebula-deep: #1a0505;
            --vibrant-crimson: #5e0b0b;
            --electric-gold: #ffdf00;
            --glass-border: rgba(255, 223, 0, 0.3);
            --transition-ultra: 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 1. KINETIC BACKGROUND ENGINE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* The Animated Nebula Background */
        .cosmic-engine {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, var(--vibrant-crimson), #000 80%);
            overflow: hidden;
        }

        .nebula-swirl {
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(191, 149, 63, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(94, 11, 11, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 0%, #000 70%);
            filter: blur(60px);
            animation: cosmicRotate 25s infinite linear;
        }

        /* Floating Gold Dust */
        .gold-dust {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 20%, #fff 100%, transparent),
                radial-gradient(2px 2px at 40% 50%, #bf953f 100%, transparent),
                radial-gradient(1px 1px at 80% 80%, #fff 100%, transparent),
                radial-gradient(2px 2px at 20% 70%, #fcf6ba 100%, transparent);
            background-size: 300px 300px;
            z-index: -1;
            opacity: 0.4;
            animation: dustFloat 20s infinite alternate linear;
        }

        /* 2. NAVIGATION & PROGRESS */
        #scroll-thread {
            position: fixed; top: 0; left: 0; width: 0%; height: 4px;
            background: var(--royal-gold); z-index: 2001;
            box-shadow: 0 0 20px var(--electric-gold);
        }

        /* 3. FLAMBOYANT TYPOGRAPHY */
        .zenith-wrapper {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 80px 20px; position: relative; z-index: 10;
        }

        .imperial-header {
            text-align: center; 
            margin-bottom: 10vh;
            perspective: 1000px;
        }

        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; 
            font-size: clamp(1.2rem, 4vw, 2rem); 
            letter-spacing: clamp(15px, 3vw, 30px); 
            text-transform: uppercase; 
            color: transparent;
            background: var(--royal-gold);
            -webkit-background-clip: text;
            display: block;
            margin-bottom: 30px;
            animation: glowPulse 3s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.5));
        }

        .main-title {
            font-family: 'Cinzel', serif; 
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: 900; 
            letter-spacing: clamp(10px, 4vw, 25px);
            text-transform: uppercase; line-height: 1.1;
            color: #fff;
            text-shadow: 
                0 0 20px rgba(191,149,63,0.8),
                0 0 40px rgba(0,0,0,1);
            transform: translateZ(50px);
        }

        /* 4. THE POWER UI CARDS */
        .aura-grid {
            display: flex; gap: 60px;
            flex-wrap: wrap; justify-content: center;
            width: 100%; max-width: 1400px;
        }

        .aura-card {
            width: clamp(300px, 35vw, 420px); 
            height: 600px;
            position: relative; 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: var(--transition-ultra);
            cursor: pointer;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .aura-card::before {
            content: ""; position: absolute; inset: -100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.8s;
            transform: rotate(45deg);
            z-index: 3;
        }

        .aura-card:hover {
            transform: translateY(-20px) scale(1.05);
            border-color: #fcf6ba;
            box-shadow: 0 0 50px rgba(191, 149, 63, 0.3);
        }

        .aura-card:hover::before { left: 100%; }

        .card-media {
            width: 100%; height: 100%; background-size: cover; background-position: center;
            opacity: 0.5; filter: contrast(1.2) saturate(1.2);
            transition: 2s var(--transition-ultra);
        }

        .aura-card:hover .card-media { 
            opacity: 1; 
            transform: scale(1.1) rotate(2deg); 
            filter: contrast(1) saturate(1.5);
        }

        .female-bg { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-bg { background-image: url('https://i.postimg.cc/9fsyq3gM/Gemini-Generated-Image-z4wx9bz4wx9bz4wx.png'); }

        .card-label {
            position: absolute; bottom: 0; width: 100%; padding: 60px 20px;
            text-align: center; 
            background: linear-gradient(transparent, #000);
            font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 15px;
            font-weight: 900;
            z-index: 10;
        }

        /* 5. VIBRANT REVEAL PORTAL */
        #reveal-portal {
            display: none; position: fixed; inset: 0;
            z-index: 3000; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2d0a0a 0%, #000 100%);
            opacity: 0; transition: opacity 1.5s ease;
        }

        .imperial-chamber {
            width: 90%; max-width: 900px;
            text-align: center; padding: 80px 40px;
            border: 2px solid #bf953f;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 150px rgba(191, 149, 63, 0.4);
            position: relative;
        }

        .imperial-chamber::after {
            content: ""; position: absolute; inset: -10px;
            border: 1px solid rgba(191,149,63,0.2);
            animation: borderPulse 4s infinite;
        }

        .aura-result {
            font-size: clamp(1.4rem, 5vw, 2.5rem); 
            font-family: 'Playfair Display', serif;
            font-weight: 900; font-style: italic;
            margin-bottom: 60px;
            background: var(--royal-gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            line-height: 1.4;
        }

        /* 6. BOLD BUTTONS */
        .btn-zenith {
            display: inline-block; padding: 25px 60px;
            background: var(--royal-gold); color: #000 !important;
            text-decoration: none; font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 0.9rem; letter-spacing: 8px;
            text-transform: uppercase; transition: 0.5s;
            box-shadow: 0 10px 30px rgba(191, 149, 63, 0.5);
        }

        .btn-zenith:hover {
            background: #fff; transform: scale(1.1) translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.4);
        }

        .reroll {
            margin-top: 50px; background: none; border: none;
            color: var(--electric-gold); font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; letter-spacing: 10px; font-size: 0.7rem;
            font-weight: 900; cursor: pointer; opacity: 0.6;
        }
        .reroll:hover { opacity: 1; letter-spacing: 15px; }

        /* 7. ANIMATIONS */
        @keyframes cosmicRotate {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1.1); }
        }

        @keyframes dustFloat {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(191, 149, 63, 1)); }
        }

        @keyframes borderPulse {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.5; }
        }

        /* 8. MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .aura-grid { flex-direction: column; align-items: center; gap: 40px; }
            .aura-card { width: 90vw; height: 500px; }
            .main-title { letter-spacing: 5px; font-size: 1.8rem; }
            .brand-text { letter-spacing: 8px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="cosmic-engine">
        <div class="nebula-swirl"></div>
    </div>
    <div class="gold-dust"></div>
    <div id="scroll-thread"></div>

    <div class="zenith-wrapper">
        <header class="imperial-header">
            <span class="brand-text">AYRA FRAGRANCES</span>
            <h1 class="main-title">BEYOND THE<br>AURA</h1>
        </header>

        <main class="aura-grid">
            <div class="aura-card" onclick="fetchAura('female')" id="femCard">
                <div class="card-media female-bg"></div>
                <div class="card-label">FEMININE</div>
            </div>

            <div class="aura-card" onclick="fetchAura('male')" id="maleCard">
                <div class="card-media male-bg"></div>
                <div class="card-label">MASCULINE</div>
            </div>
        </main>

        <div id="reveal-portal">
            <div class="imperial-chamber">
                <div id="aura-text" class="aura-result">Summoning your celestial scent profile...</div>
                <a href="https://linktr.ee/ayrafragrances" class="btn-zenith">CLAIM YOUR DESTINY</a>
                <br>
                <button class="reroll" onclick="window.location.reload()">REGENERATE SOUL</button>
            </div>
        </div>
    </div>

    <script>
        // 1. SCROLL PROGRESS
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-thread").style.width = scrolled + "%";
        });

        // 2. PARALLAX CARDS (3D TILT EFFECT)
        const cards = document.querySelectorAll('.aura-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px) scale(1.05)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(0) scale(1)`;
            });
        });

        // 3. AURA LOGIC
        const scriptURL = "https://script.google.com/macros/s/AKfycbzdYbobuvTwytAkM0TI-bLW6kxX7JMwNQdT2c-X9QNMv2aXbShRE-g3o8IRN9sAg2Dh/exec";

        function fetchAura(gender) {
            const portal = document.getElementById('reveal-portal');
            const output = document.getElementById('aura-text');
            
            portal.style.display = 'flex';
            setTimeout(() => portal.style.opacity = '1', 100);

            // Fetching from Google Sheets
            fetch(`${scriptURL}?gender=${gender}`)
                .then(r => r.text())
                .then(data => {
                    output.innerText = `"${data}"`;
                })
                .catch(err => {
                    output.innerText = "THE UNIVERSE IS QUIET. TRY AGAIN.";
                });
        }
    </script>
</body>
</html>
