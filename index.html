<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayra Fragrances | Aura Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --deep-red: #1a0505;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #0a0202; color: #d4af37; 
            font-family: 'Playfair Display', serif; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden;
        }

        /* VIBRANT ANIMATED BACKGROUND */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #3d0e0e 0%, #0a0202 100%);
            z-index: -1;
        }

        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(191, 149, 63, 0.15) 0%, transparent 70%);
            border-radius: 50%; animation: pulseGlow 8s infinite alternate;
        }

        @keyframes pulseGlow { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.5); opacity: 0.8; } }

        .container { text-align: center; width: 100%; z-index: 10; padding: 20px; box-sizing: border-box; }

        /* INTRO TEXT */
        .welcome-text {
            font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 6px;
            text-transform: uppercase; margin-bottom: 10px; opacity: 0.8;
            animation: fadeInDown 1.5s ease;
        }

        h1 { 
            font-family: 'Cinzel', serif; letter-spacing: 12px; 
            text-transform: uppercase; margin-bottom: 50px; 
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-size: clamp(1.8rem, 5vw, 2.8rem); filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
            animation: fadeInUp 1.5s ease;
        }

        /* LARGE ANIMATED CARDS */
        .card-wrapper { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; perspective: 1000px; }

        .aura-card { 
            width: 300px; height: 460px; border: 1px solid rgba(212, 175, 55, 0.5); 
            border-radius: 12px; overflow: hidden; position: relative; 
            display: flex; align-items: flex-end; cursor: pointer;
            background-size: cover; background-position: center; 
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.9);
        }

        .aura-card::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(252, 246, 186, 0.2), transparent);
            transform: skewX(-25deg); transition: 0.7s;
        }

        .aura-card:hover::after { left: 150%; }

        .aura-card:hover { 
            transform: scale(1.05) rotateY(5deg); 
            border: 2px solid #fcf6ba;
            box-shadow: 0 0 50px rgba(191, 149, 63, 0.5);
        }

        .female-img { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-img { background-image: url('https://i.postimg.cc/9fsyq3gM/Gemini-Generated-Image-z4wx9bz4wx9bz4wx.png'); }

        .card-label { 
            z-index: 2; font-family: 'Cinzel', serif; font-size: 1.4rem; 
            letter-spacing: 5px; color: #fcf6ba; width: 100%; text-align: center; 
            padding: 25px 0; background: linear-gradient(transparent, rgba(15, 5, 5, 0.95));
            transition: 0.3s;
        }

        /* REVEAL PAGE */
        #reveal-ui { display: none; }
        .reveal-chamber { 
            width: 90%; max-width: 900px; padding: 100px 40px; border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(10, 2, 2, 0.95); backdrop-filter: blur(20px);
            box-shadow: 0 0 120px rgba(0,0,0,1); border-radius: 20px;
            animation: revealZoom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message-text { 
            font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 700; color: #fff; 
            margin-bottom: 60px; line-height: 1.2; font-style: italic;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow { from { text-shadow: 0 0 5px rgba(255,255,255,0.2); } to { text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); } }

        .btn-luxury { 
            display: inline-block; padding: 22px 60px; 
            background: var(--gold); color: #000 !important; 
            text-decoration: none; font-weight: 700; letter-spacing: 5px; 
            text-transform: uppercase; font-size: 1.1rem; 
            font-family: 'Cinzel', serif; border-radius: 2px;
            transition: 0.4s; position: relative; overflow: hidden;
        }

        .btn-luxury:hover { 
            transform: scale(1.1); box-shadow: 0 0 40px rgba(212,175,55,0.7);
            letter-spacing: 7px;
        }

        /* ANIMATIONS */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 0.8; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes revealZoom { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="bg-glow"></div>

    <div class="container" id="main-ui">
        <div class="welcome-text">Welcome to Ayra Fragrances</div>
        <h1>REVEAL YOUR SCENT AURA</h1>
        <div class="card-wrapper">
            <div class="aura-card female-img" onclick="getAura('female')">
                <div class="card-label">FEMININE</div>
            </div>
            <div class="aura-card male-img" onclick="getAura('male')">
                <div class="card-label">MASCULINE</div>
            </div>
        </div>
    </div>

    <div class="container" id="reveal-ui">
        <div class="reveal-chamber">
            <div id="message" class="message-text">Seeking your essence...</div>
            <a href="https://linktr.ee/ayrafragrances" class="btn-luxury">VISIT THE COLLECTION</a>
            <div style="margin-top:60px;">
                <button onclick="window.location.reload()" style="background:none; border:none; color:rgba(212,175,55,0.4); font-size:0.9rem; letter-spacing:5px; text-transform:uppercase; cursor:pointer; font-family: 'Cinzel', serif;">REVEAL ANOTHER</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzdYbobuvTwytAkM0TI-bLW6kxX7JMwNQdT2c-X9QNMv2aXbShRE-g3o8IRN9sAg2Dh/exec";

        function getAura(gender) {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('reveal-ui').style.display = 'flex';
            
            fetch(`${scriptURL}?gender=${gender}`)
                .then(response => response.text())
                .then(text => { 
                    document.getElementById('message').innerHTML = `"${text}"`; 
                })
                .catch(err => { 
                    document.getElementById('message').innerText = "The stars are aligning. Try again."; 
                });
        }
    </script>
</body>
</html>
