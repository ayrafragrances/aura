<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AYRA | The Imperial Aura</title>
    <style>
        /* AYRA FRAGRANCES - SOVEREIGN V6.0 
           THEME: FLAMBOYANT CRIMSON & IMPERIAL GOLD
        */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,900&family=Montserrat:wght@100;300;600;900&display=swap');

        :root {
            --royal-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --vibrant-crimson: #7a0000;
            --deep-wine: #3d0000;
            --electric-gold: #ffdf00;
            --transition-ultra: 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 1. KINETIC FLAMBOYANT BACKGROUND */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--deep-wine);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        .background-engine {
            position: fixed; inset: 0;
            z-index: -2;
            /* Bold, flamboyant maroon-crimson mesh */
            background: 
                radial-gradient(circle at 20% 20%, #9e0000 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #5e0b0b 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, var(--vibrant-crimson) 0%, var(--deep-wine) 100%);
            animation: backgroundShift 15s infinite alternate ease-in-out;
        }

        .gold-overlay {
            position: fixed; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
            filter: invert(1) brightness(2);
        }

        @keyframes backgroundShift {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* 2. TYPOGRAPHY & HEADER */
        .zenith-wrapper {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; position: relative; z-index: 10;
        }

        .imperial-header {
            text-align: center; margin-bottom: 8vh;
        }

        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900; 
            font-size: clamp(1.2rem, 3vw, 1.8rem); 
            letter-spacing: clamp(12px, 2.5vw, 25px); 
            text-transform: uppercase; 
            color: #fcf6ba; 
            display: block; margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(191, 149, 63, 0.6);
        }

        .main-title {
            font-family: 'Cinzel', serif; 
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 900; 
            letter-spacing: clamp(8px, 3vw, 18px);
            text-transform: uppercase; 
            background: var(--royal-gold);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        /* 3. FLAMBOYANT CARDS */
        .aura-grid {
            display: flex; gap: clamp(30px, 5vw, 60px);
            flex-wrap: wrap; justify-content: center;
            width: 100%; max-width: 1200px;
        }

        .aura-card {
            width: clamp(280px, 35vw, 380px); height: 550px;
            position: relative; overflow: hidden;
            background: rgba(0,0,0,0.3); border: 2px solid rgba(191, 149, 63, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            cursor: pointer; transition: var(--transition-ultra);
        }

        .aura-card:hover {
            transform: translateY(-15px) rotateZ(1deg);
            border-color: #ffdf00;
            box-shadow: 0 0 40px rgba(255, 223, 0, 0.3);
        }

        .card-media {
            width: 100%; height: 100%; background-size: cover; background-position: center;
            opacity: 0.7; transition: 1.5s var(--transition-ultra);
        }

        .aura-card:hover .card-media { opacity: 1; transform: scale(1.1); }

        .female-bg { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-bg { background-image: url('https://i.postimg.cc/9fsyq3gM/Gemini-Generated-Image-z4wx9bz4wx9bz4wx.png'); }

        .card-label {
            position: absolute; bottom: 0; width: 100%; padding: 40px 20px;
            text-align: center; background: linear-gradient(transparent, #000);
            font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 10px;
            font-weight: 900; color: #fff;
        }

        /* 4. THE REVEAL PORTAL (suspense mode) */
        #reveal-portal {
            display: none; position: fixed; inset: 0;
            z-index: 3000; align-items: center; justify-content: center;
            background: radial-gradient(circle, #4a0000 0%, #000 100%);
            opacity: 0; transition: opacity 0.8s ease;
            backdrop-filter: blur(20px);
        }

        .imperial-chamber {
            width: 90%; max-width: 800px; text-align: center;
            padding: 60px 30px; border: 1px solid var(--electric-gold);
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 100px rgba(191, 149, 63, 0.2);
        }

        .aura-result {
            font-size: clamp(1.2rem, 5vw, 2.2rem); 
            font-family: 'Playfair Display', serif;
            font-style: italic; margin-bottom: 50px;
            color: #fcf6ba; line-height: 1.5;
        }

        /* 5. VIBRANT BUTTONS */
        .btn-zenith {
            display: inline-block; padding: 22px 45px;
            background: var(--royal-gold); color: #000 !important;
            text-decoration: none; font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 0.8rem; letter-spacing: 4px;
            text-transform: uppercase; transition: 0.4s;
            cursor: pointer; border: none;
        }

        .btn-zenith:hover {
            transform: scale(1.05); background: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        .reroll {
            margin-top: 40px; background: none; border: none;
            color: #ffdf00; font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; letter-spacing: 8px; font-size: 0.7rem;
            font-weight: 900; cursor: pointer; opacity: 0.6;
        }

        .reroll:hover { opacity: 1; letter-spacing: 12px; }

        @media (max-width: 768px) {
            .aura-card { width: 85vw; height: 500px; }
            .brand-text { font-size: 1rem; letter-spacing: 8px; }
            .main-title { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="background-engine"></div>
    <div class="gold-overlay"></div>

    <div class="zenith-wrapper">
        <header class="imperial-header">
            <span class="brand-text">AYRA FRAGRANCES</span>
            <h1 class="main-title">Discover your Aura</h1>
        </header>

        <main class="aura-grid">
            <div class="aura-card" onclick="fetchAura('female')">
                <div class="card-media female-bg"></div>
                <div class="card-label">FEMININE</div>
            </div>

            <div class="aura-card" onclick="fetchAura('male')">
                <div class="card-media male-bg"></div>
                <div class="card-label">MASCULINE</div>
            </div>
        </main>

        <div id="reveal-portal">
            <div class="imperial-chamber">
                <div id="aura-text" class="aura-result">Inhaling your soul essence...</div>
                <div id="cta-container" style="display: none;">
                    <a href="https://linktr.ee/ayrafragrances" class="btn-zenith">ENTER THE FRAGRANCE WONDERLAND</a>
                    <br>
                    <button class="reroll" onclick="window.location.reload()">REDEFINE DESTINY</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzdYbobuvTwytAkM0TI-bLW6kxX7JMwNQdT2c-X9QNMv2aXbShRE-g3o8IRN9sAg2Dh/exec";

        function fetchAura(gender) {
            const portal = document.getElementById('reveal-portal');
            const output = document.getElementById('aura-text');
            const cta = document.getElementById('cta-container');
            
            // Show Portal & Reset state
            portal.style.display = 'flex';
            setTimeout(() => portal.style.opacity = '1', 50);
            output.innerText = "Inhaling your soul essence...";
            cta.style.display = 'none';

            // Start API call immediately
            fetch(`${scriptURL}?gender=${gender}`)
                .then(r => r.text())
                .then(data => {
                    // Dramatic delay for the "ritual"
                    setTimeout(() => {
                        output.innerText = `"${data}"`;
                        cta.style.display = 'block';
                    }, 2500);
                })
                .catch(err => {
                    output.innerText = "THE VOID IS SILENT. REFRESH.";
                    cta.style.display = 'block';
                });
        }
    </script>
</body>
</html>
