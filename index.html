<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayra Fragrances | Aura Reveal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');

        :root {
            --gold-main: #bf953f;
            --gold-bright: #fcf6ba;
            --dark-core: #0a0202;
        }

        /* PERFUMERY NOTES BACKGROUND (NO BOTTLES) */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('https://images.unsplash.com/photo-1615485290382-441e4d0c9cb5?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #d4af37; font-family: 'Playfair Display', serif; 
            overflow: hidden;
        }

        /* LUXURY DARK OVERLAY TO PROTECT TEXT READABILITY */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(10, 2, 2, 0.92) 0%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 1; pointer-events: none;
        }

        .page-container {
            width: 100%; height: 100%; position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .content-main { 
            text-align: center; width: 100%; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            animation: slideInFade 2s ease;
        }

        .welcome-msg {
            font-family: 'Cinzel', serif; font-size: 0.75rem; 
            letter-spacing: 8px; text-transform: uppercase; 
            margin-bottom: 12px; color: #fcf6ba; display: block; 
            opacity: 0.8;
        }

        h1 { 
            font-family: 'Cinzel', serif; font-size: clamp(1.4rem, 6vw, 3.5rem); 
            letter-spacing: clamp(8px, 4vw, 22px); text-transform: uppercase; 
            margin: 0; font-weight: 900;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 20px rgba(191, 149, 63, 0.5));
        }

        /* MOBILE OPTIMIZED CARD GRID */
        .card-wrapper { 
            display: flex; gap: clamp(15px, 5vw, 60px); 
            flex-wrap: wrap; justify-content: center; 
            margin-top: clamp(30px, 8vh, 80px); 
            perspective: 2000px; 
        }

        .aura-card { 
            width: clamp(160px, 42vw, 360px); height: clamp(260px, 68vw, 550px); 
            border: 1px solid rgba(212, 175, 55, 0.5); 
            border-radius: 2px; overflow: hidden; position: relative; 
            display: flex; align-items: flex-end; cursor: pointer;
            background-size: cover; background-position: center; 
            transition: all 0.8s cubic-bezier(0.15, 0.83, 0.66, 1);
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            transform-style: preserve-3d;
        }

        .aura-card:hover { 
            transform: translateY(-25px) rotateY(-10deg); 
            border-color: #fcf6ba;
            box-shadow: 0 50px 100px rgba(191, 149, 63, 0.4);
        }

        .aura-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 45%);
            z-index: 1;
        }

        .female-img { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-img { background-image: url('https://i.postimg.cc/9fsyq3gM/Gemini-Generated-Image-z4wx9bz4wx9bz4wx.png'); }

        .card-label { 
            z-index: 2; font-family: 'Cinzel', serif; font-size: clamp(1rem, 3vw, 1.8rem); 
            letter-spacing: 6px; color: #fff; width: 100%; 
            text-align: center; padding: 30px 0; font-weight: 700;
        }

        /* MESSAGE CHAMBER: PERFECT CENTERED POSITION */
        #reveal-ui { 
            display: none; height: 100%; position: absolute; 
            top: 0; left: 0; width: 100%; 
            align-items: center; justify-content: center;
            z-index: 30; padding: 20px; box-sizing: border-box;
        }

        .reveal-chamber { 
            width: 95%; max-width: 1000px; 
            padding: clamp(60px, 12vh, 140px) clamp(20px, 4vw, 50px); 
            background: rgba(8, 2, 2, 0.97); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 0 150px rgba(0,0,0,1);
            text-align: center; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            animation: cinematicReveal 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .message-text { 
            font-size: clamp(1.4rem, 5vw, 3.8rem); font-weight: 900; 
            margin-bottom: clamp(40px, 10vh, 100px); line-height: 1.15; font-style: italic;
            background: linear-gradient(to bottom, #fff 10%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6));
        }

        .btn-luxury { 
            display: inline-block; padding: clamp(18px, 3vh, 25px) clamp(40px, 8vw, 85px); 
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c); 
            color: #000 !important; text-decoration: none; font-weight: 900; 
            letter-spacing: 6px; text-transform: uppercase; 
            font-size: clamp(0.85rem, 2vw, 1.1rem); font-family: 'Cinzel', serif; 
            transition: 0.5s; box-shadow: 0 10px 40px rgba(191, 149, 63, 0.4);
        }

        .btn-luxury:hover { 
            background: #fff; transform: scale(1.08); 
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.5);
            letter-spacing: 8px;
        }

        @keyframes slideInFade { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes cinematicReveal { from { opacity: 0; transform: scale(1.1) rotateX(5deg); } to { opacity: 1; transform: scale(1) rotateX(0); } }
    </style>
</head>
<body>

    <div class="page-container">
