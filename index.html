<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayra Fragrances | Imperial Zenith</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap');

        :root {
            --royal-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --glass-core: rgba(5, 1, 1, 0.96);
        }

        /* REAL PERFUMERY INGREDIENTS BACKGROUND (NO BOTTLES) */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000 url('http://googleusercontent.com/image_collection/image_retrieval/2078333013851241163_0') no-repeat center center fixed;
            background-size: cover;
            color: #d4af37; font-family: 'Playfair Display', serif; 
            overflow: hidden;
        }

        /* CINEMATIC LUXURY OVERLAY */
        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(15, 5, 5, 0.65) 0%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 1; pointer-events: none;
        }

        .zenith-master {
            width: 100%; height: 100vh; position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-container { 
            text-align: center; width: 100%; 
            animation: divineEntry 2.5s cubic-bezier(0.19, 1, 0.22, 1);
            margin-bottom: clamp(30px, 8vh, 60px);
        }

        .subtitle {
            font-family: 'Cinzel', serif; font-size: 0.75rem; 
            letter-spacing: 12px; text-transform: uppercase; 
            margin-bottom: 15px; color: #fcf6ba; opacity: 0.8;
        }

        h1 { 
            font-family: 'Cinzel', serif; font-size: clamp(1.6rem, 6vw, 4rem); 
            letter-spacing: clamp(10px, 4vw, 25px); text-transform: uppercase; 
            margin: 0; font-weight: 900;
            background: var(--royal-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 30px rgba(191, 149, 63, 0.6));
        }

        /* 3D KINETIC CARDS */
        .aura-grid { 
            display: flex; gap: clamp(20px, 6vw, 80px); 
            flex-wrap: wrap; justify-content: center; 
            perspective: 2500px; 
        }

        .aura-card { 
            width: clamp(165px, 42vw, 360px); height: clamp(270px, 68vw, 560px); 
            border: 1px solid rgba(212, 175, 55, 0.4); 
            border-radius: 2px; overflow: hidden; position: relative; 
            display: flex; align-items: flex-end; cursor: pointer;
            background-size: cover; background-position: center; 
            transition: all 1s cubic-bezier(0.15, 0.83, 0.66, 1);
            box-shadow: 0 40px 90px rgba(0,0,0,1);
            transform-style: preserve-3d;
        }

        .aura-card:hover { 
            transform: translateY(-30px) rotateY(-12deg) rotateX(8deg) scale(1.02); 
            border-color: #fcf6ba;
            box-shadow: 0 70px 140px rgba(191, 149, 63, 0.5);
        }

        .aura-card::before {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg); transition: 0.8s; z-index: 5;
        }
        .aura-card:hover::before { left: 150%; }

        .female-img { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-img { background-image: url('https://i.postimg.cc/9fsyq3gM/Gemini-Generated-Image-z4wx9bz4wx9bz4wx.png'); }

        .card-label { 
            z-index: 10; font-family: 'Cinzel', serif; font-size: clamp(1rem, 3vw, 2rem); 
            letter-spacing: 10px; color: #fff; width: 100%; text-align: center; 
            padding: 40px 0; font-weight: 900; background: linear-gradient(transparent, rgba(0,0,0,0.95));
        }

        /* DIVINE CENTERED REVEAL INTERFACE */
        #reveal-portal { 
            display: none; position: fixed; inset: 0;
            align-items: center; justify-content: center;
            z-index: 1000; padding: 25px;
        }

        .divine-chamber { 
            width: 100%; max-width: 1100px; 
            padding: clamp(80px, 15vh, 160px) 40px;
            background: var(--glass-core); 
            backdrop-filter: blur(50px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 250px rgba(0,0,0,1);
            text-align: center; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            animation: zenithReveal 1.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .aura-message { 
            font-size: clamp(1.6rem, 5.5vw, 4.5rem); font-weight: 900; 
            margin-bottom: clamp(50px, 10vh, 100px); line-height: 1.15; font-style: italic;
            background: linear-gradient(to bottom, #fff 15%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));
        }
