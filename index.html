<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AYRA | The Imperial Aura</title>
    <style>
        /* AYRA FRAGRANCES - IMPERIAL ENGINE V3.1 
           ADJUSTMENTS: Optimized Brand-to-Heading Ratio
        */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,600;0,900;1,500&family=Montserrat:wght@200;400;500&display=swap');

        :root {
            --royal-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --gold-soft: #d4af37;
            --Wine-(Deep):#4C0805;
            --glass-gold: rgba(191, 149, 63, 0.15);
            --transition-smooth: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 1. GLOBAL ARCHITECTURE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            width: 100%; height: 100%; 
            background-color: var(--Deep-Wine);
            color: #fff;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
            cursor: default;
        }

        /* 2. ENVIRONMENTAL ENGINE */
        .background-engine {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            z-index: -2;
            background-image: url('https://i.postimg.cc/05mRcfNq/Untitled-design.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) saturate(0.8) contrast(1.1);
            will-change: transform;
        }

        .light-leak {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(191,149,63,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
            animation: lightPulse 10s infinite alternate;
        }

        .particles {
            position: fixed; inset: 0;
            background-image: url('https://i.postimg.cc/05mRcfNq/Untitled_design.png');
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        .divine-vignette {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.98) 100%);
            pointer-events: none;
        }

        /* 3. SCROLL PROGRESS */
        #scroll-thread {
            position: fixed; top: 0; left: 0; width: 0%; height: 1px;
            background: var(--royal-gold); z-index: 2001;
            box-shadow: 0 0 10px rgba(191, 149, 63, 0.8);
        }

        /* 4. MAIN CONTAINER */
        .zenith-wrapper {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 20px; position: relative; z-index: 10;
        }

        /* 5. IMPERIAL BRANDING */
        .imperial-header {
            text-align: center; 
            margin-bottom: clamp(40px, 8vh, 60px);
            opacity: 0; transform: translateY(20px);
            animation: revealEntrance 2s forwards;
        }

        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400; 
            /* MADE BIGGER: Adjusted for prominence */
            font-size: clamp(1.2rem, 3vw, 1.8rem); 
            letter-spacing: clamp(10px, 2.5vw, 22px); 
            text-transform: uppercase; 
            color: #fcf6ba; 
            margin-bottom: 25px; 
            display: block;
            text-shadow: 0 0 10px rgba(191, 149, 63, 0.4);
        }

        .main-title {
            font-family: 'Cinzel', serif; 
            /* MADE SMALLER: Now slightly larger than brand text */
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 900; 
            letter-spacing: clamp(6px, 2vw, 15px);
            text-transform: uppercase; line-height: 1.2;
            background: var(--royal-gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* 6. KINETIC ART CARDS */
        .aura-grid {
            display: flex; gap: clamp(30px, 5vw, 80px);
            flex-wrap: wrap; justify-content: center;
            perspective: 2000px; width: 100%; max-width: 1200px;
        }

        .aura-card {
            width: clamp(280px, 40vw, 380px); 
            height: clamp(450px, 60vw, 580px);
            position: relative; overflow: hidden;
            background-color: #000; border: 1px solid rgba(191, 149, 63, 0.15);
            transition: var(--transition-smooth);
            transform-style: preserve-3d;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            cursor: pointer;
        }

        .aura-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: 0.6s; z-index: 10;
        }

        .aura-card:hover {
            border-color: #fcf6ba;
            transform: translateY(-20px) rotateX(5deg) rotateY(-5deg);
            box-shadow: 0 60px 120px rgba(191, 149, 63, 0.2);
        }

        .aura-card:hover::after { transform: translateX(100%); }

        .card-media {
            width: 100%; height: 100%; background-size: cover; background-position: center;
            opacity: 0.6; transform: scale(1);
            transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .aura-card:hover .card-media {
            opacity: 1; transform: scale(1.1);
        }

        .female-bg { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-bg { background-image: url('https://i.postimg.cc/9fsyq3gM/Gemini-Generated-Image-z4wx9bz4wx9bz4wx.png'); }

        .card-label {
            position: absolute; bottom: 0; width: 100%; padding: 60px 20px;
            text-align: center; background: linear-gradient(transparent, rgba(0,0,0,1));
            font-family: 'Cinzel', serif; font-size: 1.2rem; letter-spacing: 12px; color: #fff;
            z-index: 15;
        }

        /* 7. REVEAL PORTAL (The Chamber) */
        #reveal-portal {
            display: none; position: fixed; inset: 0;
            z-index: 3000; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); padding: 20px; opacity: 0; 
            transition: opacity 1s ease;
            backdrop-filter: blur(10px);
        }

        .imperial-chamber {
            width: 100%; max-width: 800px;
            text-align: center; position: relative;
            padding: 60px 30px;
            border: 1px solid rgba(191, 149, 63, 0.2);
            background: radial-gradient(circle at center, #080808 0%, #000 100%);
            box-shadow: 0 0 100px rgba(191, 149, 63, 0.1);
            animation: chamberScale 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .aura-result {
            font-size: clamp(1.1rem, 4vw, 1.8rem); 
            font-weight: 400; font-style: italic;
            margin-bottom: 50px; color: #fff; line-height: 1.6;
            background: linear-gradient(to bottom, #fff, #b38728);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 8. CTA ELEMENTS */
        .btn-zenith {
            display: inline-block; padding: 20px 40px;
            background: var(--royal-gold); color: #000 !important;
            text-decoration: none; font-family: 'Cinzel', serif;
            font-weight: 900; font-size: 0.8rem; letter-spacing: 5px;
            text-transform: uppercase; transition: 0.5s;
            position: relative; overflow: hidden;
        }

        .btn-zenith:hover {
            transform: scale(1.05); letter-spacing: 8px;
            background: #fff;
        }

        .reroll {
            margin-top: 40px; background: none; border: none;
            color: rgba(255, 255, 255, 0.25); font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; letter-spacing: 6px; font-size: 0.6rem;
            cursor: pointer; transition: 0.4s;
        }
        .reroll:hover { color: #fff; letter-spacing: 10px; }

        /* 9. KEYFRAME LIBRARY */
        @keyframes lightPulse {
            0% { opacity: 0.3; } 100% { opacity: 0.7; }
        }
        @keyframes revealEntrance {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes chamberScale {
            from { transform: scale(0.95) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .brand-text { font-size: 1rem; letter-spacing: 8px; }
            .main-title { font-size: 1.4rem; letter-spacing: 5px; }
            .aura-card { width: 88vw; height: 130vw; }
        }
    </style>
</head>
<body>

    <div class="background-engine" id="bgEngine"></div>
    <div class="light-leak"></div>
    <div class="particles"></div>
    <div class="divine-vignette"></div>
    <div id="scroll-thread"></div>

    <div class="zenith-wrapper">
        <header class="imperial-header">
            <span class="brand-text">AYRA FRAGRANCES</span>
            <h1 class="main-title">DISCOVER YOUR<br>AURA</h1>
        </header>

        <main class="aura-grid">
            <div class="aura-card" onclick="fetchAura('female')">
                <div class="card-media female-bg"></div>
                <div class="card-label">FEMININE</div>
            </div>

            <div class="aura-card" onclick="fetchAura('male')">
                <div class="card-media male-bg"></div>
                <div class="card-label">MASCULINE</div>
            </div>
        </main>

        <div id="reveal-portal">
            <div class="imperial-chamber">
                <div id="aura-text" class="aura-result">Inhaling your soul essence...</div>
                <a href="https://linktr.ee/ayrafragrances" class="btn-zenith">ENTER THE FRAGRANCE WONDERLAND</a>
                <br>
                <button class="reroll" onclick="window.location.reload()">REDEFINE YOUR AURA HERE</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-thread").style.width = scrolled + "%";
        });

        const scriptURL = "https://script.google.com/macros/s/AKfycbzdYbobuvTwytAkM0TI-bLW6kxX7JMwNQdT2c-X9QNMv2aXbShRE-g3o8IRN9sAg2Dh/exec";

        function fetchAura(gender) {
            const portal = document.getElementById('reveal-portal');
            const output = document.getElementById('aura-text');
            
            portal.style.display = 'flex';
            setTimeout(() => portal.style.opacity = '1', 50);

            fetch(`${scriptURL}?gender=${gender}`)
                .then(r => r.text())
                .then(data => {
                    output.innerText = `"${data}"`;
                })
                .catch(err => {
                    output.innerText = "THE VOID IS SILENT. REFRESH.";
                    console.error('Imperial Error:', err);
                });
        }

        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 80;
                const y = (window.innerHeight / 2 - e.pageY) / 80;
                document.getElementById('bgEngine').style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
            });
        }
    </script>
</body>
</html>
