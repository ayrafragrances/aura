<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AYRA | The Imperial Aura</title>
    <style>
        /* AYRA FRAGRANCES - IMPERIAL ENGINE V3.3 */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,600;0,900;1,500&family=Montserrat:wght@200;400;500&display=swap');

        :root {
            --royal-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --gold-soft: #d4af37;
            --transition-smooth: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            /* SHARED BACKGROUND ASSET */
            --imperial-bg: url('https://i.postimg.cc/05mRcfNq/Untitled-design.png');
        }

        /* 1. GLOBAL ARCHITECTURE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            width: 100%; height: 100%; 
            background-color: #000;
            color: #fff;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        /* 2. MAIN PAGE BACKGROUND ENGINE */
        .background-engine {
            position: fixed; top: -5%; left: -5%; width: 110%; height: 110%;
            z-index: -2;
            background-image: var(--imperial-bg);
            background-size: cover;
            background-position: center;
            filter: brightness(0.35) contrast(1.1);
            will-change: transform;
        }

        .divine-vignette {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
        }

        /* 3. BRANDING & CARDS */
        .zenith-wrapper {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 60px 20px; position: relative; z-index: 10;
        }

        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.5rem); 
            letter-spacing: 15px; text-transform: uppercase; 
            color: #fcf6ba; margin-bottom: 20px; display: block;
            text-align: center;
        }

        .main-title {
            font-family: 'Cinzel', serif; 
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 900; letter-spacing: 8px;
            text-transform: uppercase; text-align: center;
            background: var(--royal-gold); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
        }

        .aura-grid {
            display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
        }

        .aura-card {
            width: 300px; height: 450px; position: relative; 
            overflow: hidden; border: 1px solid rgba(191, 149, 63, 0.2);
            cursor: pointer; transition: var(--transition-smooth);
        }

        .aura-card:hover { transform: translateY(-10px); border-color: #fcf6ba; }

        .female-bg { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); background-size: cover; height: 100%; opacity: 0.7; transition: 0.5s; }
        .male-bg { background-image: url('https://i.postimg.cc/Pf6cnWb8/Gemini_Generated_Image_z4wx9bz4wx9bz4wx.png'); background-size: cover; height: 100%; opacity: 0.7; transition: 0.5s; }
        
        .aura-card:hover .female-bg, .aura-card:hover .male-bg { opacity: 1; transform: scale(1.05); }

        .card-label {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; letter-spacing: 5px; font-size: 1rem;
        }

        /* 4. REVEAL PORTAL (NOW MATCHING EXACTLY) */
        #reveal-portal {
            display: none; position: fixed; inset: 0;
            z-index: 3000; align-items: center; justify-content: center;
            /* Same background engine logic as the main page */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), var(--imperial-bg);
            background-size: cover;
            background-position: center;
            opacity: 0; transition: opacity 0.8s ease;
            backdrop-filter: blur(5px);
        }

        .imperial-chamber {
            width: 90%; max-width: 600px; text-align: center;
        }

        #loading-message {
            font-family: 'Montserrat', sans-serif;
            color: #fcf6ba; letter-spacing: 3px; font-style: italic;
            animation: pulseFade 1.5s infinite alternate;
            margin-bottom: 20px;
        }

        /* 5. PHYSICAL SCROLL PAPER */
        .scroll-paper {
            position: relative; width: 100%; background: #f4e4bc;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            display: none; clip-path: inset(100% 0 0 0);
            transition: clip-path 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 40px;
        }

        .scroll-paper.unrolled { display: block; clip-path: inset(0% 0 0 0); }

        .scroll-roller {
            position: absolute; bottom: 0; left: -1%; width: 102%; height: 12px;
            background: var(--royal-gold); border-radius: 6px;
        }

        .aura-result {
            padding: 60px 30px; color: #1a1a1a; font-size: 1.4rem;
            font-style: italic; font-weight: 600; line-height: 1.6;
        }

        /* 6. BUTTONS */
        .btn-zenith {
            display: inline-block; padding: 18px 35px;
            background: var(--royal-gold); color: #000;
            text-decoration: none; font-family: 'Cinzel', serif;
            font-weight: 900; letter-spacing: 4px; font-size: 0.8rem;
            text-transform: uppercase; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .reroll {
            margin-top: 25px; background: none; border: none;
            color: rgba(255,255,255,0.5); font-family: 'Montserrat', sans-serif;
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
        }

        @keyframes pulseFade { from { opacity: 0.3; } to { opacity: 1; } }

        @media (max-width: 768px) {
            .aura-card { width: 80vw; height: 120vw; }
        }
    </style>
</head>
<body>

    <div class="background-engine" id="bgEngine"></div>
    <div class="divine-vignette"></div>

    <div class="zenith-wrapper">
        <header>
            <span class="brand-text">AYRA FRAGRANCES</span>
            <h1 class="main-title">DISCOVER YOUR AURA</h1>
        </header>

        <main class="aura-grid">
            <div class="aura-card" onclick="fetchAura('female')">
                <div class="female-bg"></div>
                <div class="card-label">FEMININE</div>
            </div>
            <div class="aura-card" onclick="fetchAura('male')">
                <div class="male-bg"></div>
                <div class="card-label">MASCULINE</div>
            </div>
        </main>

        <div id="reveal-portal">
            <div class="imperial-chamber">
                <div id="loading-message">Inhaling your soul essence. Please wait...</div>
                
                <div class="scroll-paper" id="paper-element">
                    <div id="aura-text" class="aura-result"></div>
                    <div class="scroll-roller"></div>
                </div>

                <a href="https://linktr.ee/ayrafragrances" class="btn-zenith">ENTER THE FRAGRANCE WONDERLAND</a>
                <br>
                <button class="reroll" onclick="window.location.reload()">REDEFINE YOUR AURA HERE</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzwQhPG0UFW-6yIVnwgcqq2bvoSFnvYTKhkxSnHCHkFBjk4AtXC7ibfFJNsc5LTSFPy/exec";

        function fetchAura(gender) {
            const portal = document.getElementById('reveal-portal');
            const output = document.getElementById('aura-text');
            const loading = document.getElementById('loading-message');
            const paper = document.getElementById('paper-element');
            
            portal.style.display = 'flex';
            setTimeout(() => portal.style.opacity = '1', 50);

            fetch(`${scriptURL}?gender=${gender}`)
                .then(r => r.text())
                .then(data => { 
                    loading.style.display = 'none';
                    output.innerText = `"${data}"`;
                    paper.style.display = 'block';
                    setTimeout(() => paper.classList.add('unrolled'), 50);
                })
                .catch(() => {
                    loading.style.display = 'none';
                    output.innerText = "The stars are misaligned. Please try again.";
                    paper.style.display = 'block';
                    paper.classList.add('unrolled');
                });
        }

        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const bg = document.getElementById('bgEngine');
            if(bg) bg.style.transform = `translate(${x}px, ${y}px) scale(1.1)`;
        });
    </script>
</body>
</html>
