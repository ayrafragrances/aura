<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AYRA | The Imperial Aura</title>
    <style>
        /* AYRA FRAGRANCES - IMPERIAL ENGINE V3.1 
           Aesthetic: Minimalist, Old Money, Quiet Luxury
        */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:ital,wght@0,600;0,900;1,500&family=Montserrat:wght@200;400;500&display=swap');

        :root {
            --royal-gold: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 70%, #fbf5b7 85%, #aa771c 100%);
            --gold-soft: #d4af37;
            --Deep-Wine: #1a0505;
            --glass-gold: rgba(191, 149, 63, 0.15);
            --transition-smooth: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html { 
            width: 100%; height: 100%; 
            background-color: var(--Deep-Wine);
            color: #fff;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        .background-engine {
            position: fixed; inset: -5%; width: 110%; height: 110%;
            z-index: -2;
            background-image: url('https://i.postimg.cc/05mRcfNq/Untitled-design.png');
            background-size: cover; background-position: center;
            filter: brightness(0.2);
        }

        .divine-vignette {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
        }

        .zenith-wrapper {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; position: relative; z-index: 10;
        }

        .imperial-header { text-align: center; margin-bottom: 60px; }

        .brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem); 
            letter-spacing: 12px; text-transform: uppercase; 
            color: #fcf6ba; margin-bottom: 15px; display: block;
        }

        .main-title {
            font-family: 'Cinzel', serif; 
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 900; letter-spacing: 8px;
            background: var(--royal-gold); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .aura-grid {
            display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
            width: 100%; max-width: 1000px;
        }

        .aura-card {
            width: 320px; height: 480px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(191, 149, 63, 0.2);
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .aura-card:hover { transform: translateY(-10px); border-color: #fcf6ba; }

        .card-media {
            width: 100%; height: 100%; background-size: cover; background-position: center;
            opacity: 0.5; transition: 1.5s var(--transition-smooth);
        }

        .aura-card:hover .card-media { opacity: 0.9; transform: scale(1.05); }

        .female-bg { background-image: url('https://i.postimg.cc/g01369tz/Gemini-Generated-Image-usj8m5usj8m5usj8.png'); }
        .male-bg { background-image: url('https://i.postimg.cc/Pf6cnWb8/Gemini_Generated_Image_z4wx9bz4wx9bz4wx.png'); }

        .card-label {
            position: absolute; bottom: 0; width: 100%; padding: 30px;
            text-align: center; background: linear-gradient(transparent, #000);
            font-family: 'Cinzel', serif; letter-spacing: 6px; font-size: 1rem;
        }

        #reveal-portal {
            display: none; position: fixed; inset: 0;
            z-index: 3000; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            opacity: 0; transition: opacity 0.8s ease;
        }

        .imperial-chamber {
            width: 90%; max-width: 600px; text-align: center;
            padding: 50px 20px; border: 1px solid rgba(191, 149, 63, 0.3);
            background: #000; box-shadow: 0 0 50px rgba(191, 149, 63, 0.1);
        }

        .aura-result {
            font-size: 1.4rem; font-style: italic; margin-bottom: 40px;
            color: #fff; line-height: 1.6;
        }

        .btn-zenith {
            display: inline-block; padding: 18px 35px;
            background: var(--royal-gold); color: #000;
            font-family: 'Cinzel', serif; font-weight: 700;
            text-decoration: none; letter-spacing: 3px;
            transition: 0.4s;
        }

        .reroll {
            margin-top: 30px; background: none; border: none;
            color: rgba(255,255,255,0.4); letter-spacing: 4px;
            cursor: pointer; text-transform: uppercase; font-size: 0.7rem;
        }

        @media (max-width: 768px) {
            .aura-card { width: 80vw; height: 110vw; }
            .brand-text { letter-spacing: 6px; }
        }
    </style>
</head>
<body>

    <div class="background-engine"></div>
    <div class="divine-vignette"></div>

    <div class="zenith-wrapper">
        <header class="imperial-header">
            <span class="brand-text">AYRA FRAGRANCES</span>
            <h1 class="main-title">DISCOVER YOUR AURA</h1>
        </header>

        <main class="aura-grid">
            <div class="aura-card" onclick="fetchAura('female')">
                <div class="card-media female-bg"></div>
                <div class="card-label">FEMININE</div>
            </div>

            <div class="aura-card" onclick="fetchAura('male')">
                <div class="card-media male-bg"></div>
                <div class="card-label">MASCULINE</div>
            </div>
        </main>

        <div id="reveal-portal">
            <div class="imperial-chamber">
                <div id="aura-text" class="aura-result">Inhaling your soul essence...</div>
                <a href="https://linktr.ee/ayrafragrances" class="btn-zenith">ENTER THE FRAGRANCE WONDERLAND</a>
                <br>
                <button class="reroll" onclick="window.location.reload()">REDEFINE AURA</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzwQhPG0UFW-6yIVnwgcqq2bvoSFnvYTKhkxSnHCHkFBjk4AtXC7ibfFJNsc5LTSFPy/exec";

        function fetchAura(gender) {
            const portal = document.getElementById('reveal-portal');
            const output = document.getElementById('aura-text');
            
            // 1. Show the loading screen immediately
            output.innerText = "Inhaling your soul essence...";
            portal.style.display = 'flex';
            setTimeout(() => portal.style.opacity = '1', 50);

            // 2. Fetch data in the background
            fetch(`${scriptURL}?gender=${gender}`)
                .then(r => r.text())
                .then(data => { 
                    // 3. Only replace the text when the data arrives
                    output.innerText = `"${data}"`; 
                })
                .catch(err => {
                    output.innerText = "THE VOID IS SILENT. REFRESH.";
                });
        }
    </script>
</body>
</html>
